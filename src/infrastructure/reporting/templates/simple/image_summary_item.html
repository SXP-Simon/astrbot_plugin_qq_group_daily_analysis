{% if image_summaries %}
<div class="image-moments-section-simple" style="margin-top: 40px; padding: 20px; background: #fff; border: 1px solid #eee; border-radius: 8px;">
    <h3 style="margin-bottom: 25px; border-bottom: 2px solid #333; padding-bottom: 10px; font-size: 1.4rem;">图片名场面 Image Moments</h3>

    {% for item in image_summaries %}
    <div style="display: flex; gap: 20px; margin-bottom: 35px; border-bottom: 1px solid #f0f0f0; padding-bottom: 25px;">
        <div style="flex: 0 0 50px;">
            {% if item.avatar_url %}
            <img src="{{ item.avatar_url }}" style="width: 50px; height: 50px; border-radius: 4px; border: 1px solid #ddd;">
            {% endif %}
            <div style="font-size: 0.8rem; color: #666; text-align: center; margin-top: 5px; overflow: hidden; text-overflow: ellipsis;">{{ item.sender }}</div>
        </div>
        <div style="flex: 1; min-width: 0;">
            <div style="background: #f9f9f9; border: 1px solid #eee; padding: 5px; margin-bottom: 12px; border-radius: 4px;">
                <img src="{{ item.url }}" style="width: 100%; max-height: 800px; height: auto; object-fit: contain; display: block;">
            </div>
            <div style="color: #333; line-height: 1.5; font-size: 1rem;">
                <strong>💡 锐评：</strong> {{ item.description }}
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
