{% if image_summaries %}
<div class="image-moments-section-new" style="margin-top: 60px; width: 100%;">
    <div class="image-moments-header" style="font-size: 26px; color: var(--miku-dark); font-weight: 900; text-align: center; margin-bottom: 50px; display: flex; align-items: center; justify-content: center; gap: 15px;">
        <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" fill="none" style="width: 36px; height: 36px; color: var(--miku-dark);">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/>
            <circle cx="18" cy="16" r="3"/>
        </svg>
        Miku's Collection - 图片名场面
    </div>

    {% for item in image_summaries %}
    <div class="img-moment-card avoid-break" style="display: flex; gap: 25px; margin-bottom: 70px; width: 100%; align-items: flex-start;">
        <!-- Avatar & Name Column (Fixed Left) -->
        <div class="img-moment-user" style="flex: 0 0 85px; display: flex; flex-direction: column; align-items: center; gap: 12px;">
            {% if item.avatar_url %}
            <div style="width: 72px; height: 72px; border-radius: 50%; border: 4px solid white; box-shadow: 0 0 0 2px var(--miku-light); flex-shrink: 0; overflow: hidden; background: var(--bg-page-base);">
                <img src="{{ item.avatar_url }}" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            {% endif %}
            <div style="font-weight: 900; color: var(--miku-dark); font-size: 0.95rem; text-align: center; word-break: break-all;">{{ item.sender }}</div>
        </div>

        <!-- Content Column (Bubble) -->
        <div class="img-moment-content" style="flex: 1; min-width: 0;">
            <div style="background: white; border: 2.5px solid var(--miku-light); border-radius: 4px 28px 28px 28px; padding: 18px; box-shadow: 0 15px 50px rgba(57,197,187,0.15); position: relative;">
                <!-- Image Container -->
                <div style="background: var(--bg-page-base); border-radius: 20px; overflow: hidden; border: 1.5px solid rgba(57,197,187,0.1); margin-bottom: 25px;">
                    <img src="{{ item.url }}" style="width: 100%; max-height: 1200px; height: auto; object-fit: contain; display: block;">
                </div>
                
                <!-- Commentary Block -->
                <div style="padding: 20px; background: #fff; border-radius: 16px; border-left: 6px solid var(--miku-pink-light); box-shadow: 0 6px 20px rgba(0,0,0,0.04);">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                        <span style="font-weight: 950; color: var(--miku-dark); font-size: 1.15rem; letter-spacing: 0.05em;">MIKU 锐评</span>
                    </div>
                    <div style="font-size: 1.05rem; color: var(--text-main); line-height: 1.7; font-style: italic; opacity: 0.9;">
                        "{{ item.description }}"
                    </div>
                </div>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
