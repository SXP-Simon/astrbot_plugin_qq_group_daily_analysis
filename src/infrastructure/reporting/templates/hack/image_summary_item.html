{% if image_summaries %}
<div class="image-moments-section-hack" style="margin-top: 50px; border: 1px solid var(--hack-green); background: rgba(0, 255, 65, 0.02); padding: 25px;">
    <div style="font-family: 'Fira Code', monospace; color: var(--hack-green); margin-bottom: 30px; font-size: 1.2rem; border-bottom: 1px solid var(--hack-green); padding-bottom: 10px;">
        <span style="color: #fff;">[</span> IMAGE_ANALYSIS_SUBSYSTEM <span style="color: #fff;">]</span>
    </div>

    {% for item in image_summaries %}
    <div class="img-moment-card avoid-break" style="display: flex; gap: 20px; margin-bottom: 40px; border-left: 3px solid var(--hack-green); padding-left: 20px;">
        <!-- User info column -->
        <div style="flex: 0 0 70px; text-align: center;">
            {% if item.avatar_url %}
            <div style="width: 50px; height: 50px; border: 1px solid var(--hack-green); padding: 2px; margin: 0 auto 8px;">
                <img src="{{ item.avatar_url }}" style="width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) brightness(1.2);">
            </div>
            {% endif %}
            <div style="font-size: 0.8rem; color: var(--hack-green); font-family: monospace;">@{{ item.sender }}</div>
        </div>

        <!-- Content -->
        <div style="flex: 1; min-width: 0;">
            <div style="border: 1px solid rgba(0, 255, 65, 0.3); background: #000; margin-bottom: 15px; padding: 4px;">
                <img src="{{ item.url }}" style="width: 100%; max-height: 800px; height: auto; object-fit: contain; display: block;">
            </div>
            <div style="font-family: 'Fira Code', monospace; color: var(--hack-green); font-size: 0.9rem; line-height: 1.6;">
                <span style="color: #fff;">root@astrbot:~#</span> ./analyze_image --verbose
                <br>
                <span style="color: rgba(0, 255, 65, 0.7);">>> Output:</span> {{ item.description }}
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
