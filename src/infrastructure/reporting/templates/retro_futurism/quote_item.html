{% if quotes %}
{% for quote in quotes %}
<section class="quote-item">
    {% if quote.avatar_url %}
    <div class="quote-avatar">
        <img src="{{ quote.avatar_url }}" alt="{{ quote.sender }}">
    </div>
    {% elif quote.avatar_data %}
    <div class="quote-avatar">
        <img src="{{ quote.avatar_data }}" alt="{{ quote.sender }}">
    </div>
    {% endif %}
    <div class="quote-body break-safe">
        <div class="quote-content break-safe">{{ quote.content }}</div>
        <div class="quote-author break-safe">ORIGIN: {{ quote.sender }}</div>
        <div class="quote-reason-small break-safe">ANALYSIS // {{ quote.reason | safe }}</div>
    </div>
</section>
{% endfor %}
{% endif %}
