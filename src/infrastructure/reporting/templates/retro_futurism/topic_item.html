{% if topics %}
{% for topic in topics %}
<section class="topic-item">
    <div class="topic-content">
        <h3 class="topic-title break-safe">{{ topic.topic.topic }}</h3>
        <div class="topic-meta break-safe">SUBJECT ID: #{{ "%02d"|format(loop.index) }} // PARTICIPANTS: {{ topic.contributors }}
        </div>
        <div class="topic-detail break-safe">{{ topic.detail | safe }}</div>
    </div>
</section>
{% endfor %}
{% endif %}
