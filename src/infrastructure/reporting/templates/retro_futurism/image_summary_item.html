{% if image_summaries %}
<div class="image-moments-section-new" style="margin-top: 40px; border-top: 2px solid var(--crt-green); padding-top: 30px;">
    <div class="section-title" style="color: var(--crt-green); font-family: 'Courier New', Courier, monospace; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; text-align: center;">
        >>> [ RECORDED_IMAGE_MOMENTS ] <<<
    </div>

    {% for item in image_summaries %}
    <div class="img-moment-card avoid-break" style="display: flex; gap: 20px; margin-bottom: 40px; border: 1px solid rgba(51, 255, 51, 0.3); padding: 15px; background: rgba(0, 20, 0, 0.4);">
        <!-- Avatar Column -->
        <div style="flex: 0 0 60px; text-align: center;">
            {% if item.avatar_url %}
            <div style="width: 50px; height: 50px; border: 1px solid var(--crt-green); filter: sepia(100%) hue-rotate(90deg) brightness(1.2); margin-bottom: 5px;">
                <img src="{{ item.avatar_url }}" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            {% endif %}
            <div style="font-size: 0.8rem; color: var(--crt-green); font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">{{ item.sender }}</div>
        </div>

        <!-- Content Column -->
        <div style="flex: 1; min-width: 0;">
            <div style="border: 1px solid var(--crt-green); padding: 5px; background: #000; margin-bottom: 15px;">
                <img src="{{ item.url }}" style="width: 100%; max-height: 800px; height: auto; object-fit: contain; display: block; filter: contrast(1.1) brightness(0.9);">
            </div>
            <div style="color: var(--crt-green); font-family: 'Courier New', monospace; line-height: 1.5; font-size: 0.95rem;">
                <span style="background: var(--crt-green); color: #000; padding: 0 5px; margin-right: 8px;">ANALYSIS:</span>
                {{ item.description }}
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
