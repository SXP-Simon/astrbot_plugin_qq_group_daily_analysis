<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=800, initial-scale=1">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 800px;
            height: 240px;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: transparent !important;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .histogram {
            width: 800px;
            height: 240px;
            padding: 14px 18px 10px;
            display: grid;
            grid-template-columns: repeat(24, minmax(0, 1fr));
            column-gap: 5px;
            align-items: stretch;
        }

        .hour {
            min-width: 0;
            display: grid;
            grid-template-rows: 194px 22px;
            row-gap: 0;
        }

        .bar-area {
            min-width: 0;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            border-bottom: 1px solid rgba(91, 143, 249, 0.24);
        }

        .bar {
            width: min(16px, 72%);
            height: var(--height);
            min-height: var(--min-height);
            border-radius: 6px 6px 2px 2px;
            background: linear-gradient(180deg, #86b8ff 0%, #5b8ff9 100%);
        }

        .label {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            color: #566074;
            font-size: 11px;
            font-weight: 600;
            line-height: 18px;
            letter-spacing: -0.2px;
            text-shadow: 0 1px 1px rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body>
    <div class="histogram">
        {% for item in chart_data %}
        <div class="hour">
            <div class="bar-area">
                <div
                    class="bar"
                    style="--height: {{ item.height }}%; --min-height: {{ '3px' if item.count > 0 else '0' }};"
                ></div>
            </div>
            <div class="label">{{ item.hour }}</div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
